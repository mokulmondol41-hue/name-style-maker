name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download and resize app logo
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
          import urllib.request, os
          from PIL import Image
          import io

          url = "https://i.ibb.co/N6BgYKDc/file-0000000044b07208a2a73e4450cfe3b2.png"
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req) as r:
              data = r.read()

          img = Image.open(io.BytesIO(data)).convert("RGBA")

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          base = 'app/src/main/res'
          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(os.path.join(path, 'ic_launcher.png'))
              resized.save(os.path.join(path, 'ic_launcher_round.png'))
              print(f"Saved {folder}: {size}x{size}")
          PYEOF

      - name: Generate gradlew
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FF-Name-Style-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
